services:
  mariadb:
    image: mariadb:10.6
    container_name: g22_mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: mobility_db
      MARIADB_USER: g22user
      MARIADB_PASSWORD: g22password
    # This command below is the "Kill Switch" for the errors you had
    command: [
      "mysqld",
      "--character-set-server=utf8mb4",
      "--collation-server=utf8mb4_unicode_ci"
    ]
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql

  mongodb:
    image: mongo:7
    container_name: g22_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: g22user
      MONGO_INITDB_ROOT_PASSWORD: g22password
      MONGO_INITDB_DATABASE: mobility_nosql
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mariadb_data:
  mongodb_data: